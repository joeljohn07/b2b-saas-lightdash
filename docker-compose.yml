# Self-hosted Lightdash stack for local development against the sibling
# b2b-saas-dbt project. See docs/setup.md for the full setup walkthrough.
#
# Services:
#   - lightdash  : the Lightdash web app (port 8080)
#   - db         : Postgres for Lightdash's own metadata
#                  (NOT the data warehouse — that's BigQuery, configured via
#                  the Lightdash UI on first run)
#
# Authentication to BigQuery is handled inside the Lightdash project setup,
# not here. For local dev, mount your gcloud ADC credentials (see setup.md).
# For deployment, paste a service-account key into the Lightdash UI.

services:
  lightdash:
    image: lightdash/lightdash:latest
    container_name: lightdash
    # The official Lightdash image is amd64-only. On Apple Silicon (M-series)
    # this requires QEMU emulation — Colima auto-installs the emulator. Slower
    # than native but functional. Drop this line on amd64 hosts (Linux servers,
    # Intel Macs) for native speed.
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # ---- Lightdash core ----
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET}
      LIGHTDASH_LOG_LEVEL: ${LIGHTDASH_LOG_LEVEL:-info}
      SITE_URL: ${SITE_URL:-http://localhost:8080}
      PORT: 8080
      # ---- Postgres backend for Lightdash metadata ----
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-lightdash}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-lightdash}
      # ---- dbt project location (inside the container) ----
      # The dbt project is mounted from the sibling repo, see `volumes` below.
      DBT_PROJECT_DIR: /usr/app/dbt
      # The dbt project's _sources.yml files use env_var('GCP_PROJECT_ID') so
      # the dbt subprocess inside the container needs this passed through.
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      # The dbt subprocess Lightdash spawns wants to write logs and compiled
      # artifacts. We mount the project read-only (deliberately — the user's
      # working copy must not be mutated by Lightdash), so redirect the writes
      # to /tmp paths that are writable inside the container.
      DBT_LOG_PATH: /tmp/dbt-logs
      DBT_TARGET_PATH: /tmp/dbt-target
      # ---- S3-compatible storage for BigQuery result pagination ----
      # Lightdash 0.2914+ requires S3-compatible storage to paginate query
      # results from BigQuery. MinIO provides the S3 API locally. Setting
      # S3_PUBLIC_ENDPOINT to localhost so presigned URLs work in the browser
      # (the in-cluster endpoint http://minio:9000 isn't reachable from outside
      # Docker's network).
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET: lightdash-results
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${LIGHTDASH_PORT:-8080}:8080"
    volumes:
      # Mount the sibling b2b-saas-dbt project read-write.
      # dbt deps needs to refresh dbt_packages/ inside the project; read-only
      # would block it. The host copy is git-tracked, so accidental mutation
      # by Lightdash is recoverable. Logs and target/ are still redirected to
      # /tmp via DBT_LOG_PATH and DBT_TARGET_PATH above (keeps the host
      # working tree clean of run artifacts).
      - ../b2b-saas-dbt:/usr/app/dbt
      # Mount gcloud ADC credentials for local BigQuery auth.
      # Skip this in production — paste a service-account key into the
      # Lightdash UI on first project setup instead.
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped

  minio:
    # S3-compatible storage backend for Lightdash query result pagination.
    # Required by Lightdash 0.2914+ to render BigQuery query results — without
    # it, queries succeed but the UI errors with "Native pagination not
    # supported. Please configure S3 Storage to use bigquery".
    image: minio/minio:latest
    container_name: lightdash-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - lightdash-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    # One-shot container that waits for MinIO to be healthy, then creates the
    # lightdash-results bucket. Exits after running. Re-running compose up
    # re-runs this; bucket creation is idempotent (--ignore-existing).
    image: minio/mc:latest
    container_name: lightdash-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: |-
      sh -c "
        mc alias set local http://minio:9000 \"$$MINIO_ACCESS_KEY\" \"$$MINIO_SECRET_KEY\" &&
        mc mb --ignore-existing local/lightdash-results &&
        echo 'Bucket lightdash-results ready.'
      "
    restart: "no"

  db:
    image: postgres:16-alpine
    container_name: lightdash-db
    environment:
      POSTGRES_USER: ${PGUSER:-lightdash}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-lightdash}
    volumes:
      - lightdash-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-lightdash} -d ${PGDATABASE:-lightdash}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  lightdash-pgdata:
  lightdash-minio-data:
